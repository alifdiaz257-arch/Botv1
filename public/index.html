<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifxAi — Discord Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="background-gradient"></div>
    
    <nav class="navbar">
        <div class="container">
            <div class="logo">💙 LIFX AI</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/invite">Invite</a>
                <a href="/auth/discord" class="btn btn-primary" id="loginBtn">🎮 Login with Discord</a>
            </div>
        </div>
    </nav>
    
    <section class="hero">
        <div class="container">
            <h1>Discord Bot<br><span style="color: #3B82F6;">Powerful & Easy to Use</span></h1>
            <p class="subtitle">Bot Discord dengan 50+ fitur lengkap. Gratis untuk semua server!</p>
            <div style="display: flex; gap: 16px; justify-content: center;">
                <a href="/auth/discord" class="btn btn-primary">🎮 Login with Discord</a>
                <a href="/invite" class="btn btn-outline">➕ Invite Bot</a>
            </div>
        </div>
    </section>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="statServers">0</div><div class="stat-label">Active Servers</div></div>
            <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div class="stat-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-value" id="statCommands">0</div><div class="stat-label">Commands</div></div>
            <div class="stat-card"><div class="stat-value" id="statPing">0</div><div class="stat-label">Ping (ms)</div></div>
        </div>
    </div>
    
    <footer class="footer">
        <div class="container">
            <p>💙 LIFX AI — Discord Bot by <strong>ANGGA GANTENG</strong></p>
        </div>
    </footer>
    
    <script>
        async function fetchStats() {
            try {
                const res = await fetch('/api/bot/stats');
                const data = await res.json();
                document.getElementById('statServers').innerText = data.servers || 0;
                document.getElementById('statUsers').innerText = data.users || 0;
                document.getElementById('statCommands').innerText = data.commands || 0;
                document.getElementById('statPing').innerText = data.ping || 0;
            } catch(e) { console.error(e); }
        }
        fetchStats();
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
